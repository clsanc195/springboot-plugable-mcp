services:

  postgres:
    image: postgres:17
    container_name: mcp-tools-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mcp_tools
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_tools"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "8080:8080"
    environment:
      # Primary JDBC source
      PRIMARY_DB_URL: jdbc:postgresql://postgres:5432/mcp_tools
      PRIMARY_DB_USERNAME: postgres
      PRIMARY_DB_PASSWORD: postgres
      PRIMARY_DB_DRIVER: org.postgresql.Driver
      # Secondary JDBC source (same DB for demo — would be a different DB in production)
      SECONDARY_DB_URL: jdbc:postgresql://postgres:5432/mcp_tools
      SECONDARY_DB_USERNAME: postgres
      SECONDARY_DB_PASSWORD: postgres
      SECONDARY_DB_DRIVER: org.postgresql.Driver
    depends_on:
      postgres:
        condition: service_healthy

  mcp-inspector:
    image: node:22-slim
    container_name: mcp-inspector
    ports:
      - "6274:6274"
      - "6277:6277"
    environment:
      HOST: "0.0.0.0"
      CLIENT_PORT: "6274"
      SERVER_PORT: "6277"
      DANGEROUSLY_OMIT_AUTH: "true"
    volumes:
      - ./inspector-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - mcp-server

volumes:
  pgdata:
